<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Effects</title>
    <link rel="stylesheet" href="animations.css">
</head>

<body>
    <h1>🔥 Demo Hiệu Ứng CSS</h1>
    <div class="products">
        <div class="card">
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200" alt="pic1">
            </div>
            <div class="content">
                <h2 class="title">Nije Air Max</h2>
                <p class="price">2.500.000đ</p>
                <button class="btn">Mua ngay</button>
            </div>
        </div>
        <div class="card">
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1200" alt="pic2">
            </div>
            <div class="content">
                <h2 class="title">Adidas Ultraboost</h2>
                <p class="price">3.200.000đ</p>
                <button class="btn">Mua ngay</button>
            </div>
        </div>
        <div class="card">
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200" alt="pic3">
            </div>
            <div class="content">
                <h2 class="title">Puma Runner</h2>
                <p class="price">1.900.000đ</p>
                <button class="btn">Mua ngay</button>
            </div>
        </div>
    </div>
    <div class="loading-container">
        <div class="spinner"></div>
    </div>
</body>

</html>
