<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Product Page</title>
</head>

<body style="font-family: Arial, sans-seriff; margin: 20px;">
    <h1>Trang giới thiệu sản phẩm</h1>
    <section>
        <h2>Logo thương hiệu</h2>
        <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" fill="#4CAF50"></circle>
            <text x="60" y="68" text-anchor="middle" font-size="24" fill="white" font-family="Arial">SHOP</text>
        </svg>
    </section>

    <hr>

    <section>
        <h2>Hình ảnh sản phẩm</h2>
        <figure>
            <img src="https://cdnv2.tgdd.vn/mwg-static/tgdd/Products/Images/42/339180/vivo-y39-5g-tim-10-638872439475353283-750x500.jpg"
                alt="Điện thoại thông minh màu đen" loading="lazy" style="max-width:100%; height:auto;">
            <figcaption>Điện thoại thông minh thế hệ mới</figcaption>
        </figure>
        <figure>
            <img src="https://cdnv2.tgdd.vn/mwg-static/tgdd/Products/Images/54/329154/airpods-4-cong-usb-c-anc-1-638615780217991382-750x500.jpg"
                alt="Tai nghe không dây màu trắng" loading="lazy" style="max-width:100%; height:auto">
            <figcaption>Tai nghe không dây chất lượng cao</figcaption>
        </figure>
        <figure>
            <img src="https://cdn.tgdd.vn/Products/Images/7077/327697/samsung-galaxy-watch7-44mm-bac-3-750x500.jpg"
                alt="Đồng hồ thông minh hiển thị màn hình" loading="lazy" style="max-width:100% ; height:auto;">
            <figcaption>Đồng hồ thông minh hiện đại</figcaption>
        </figure>
    </section>

    <hr>

    <!--HTML5 video-->
    <section>
        <h2>Video giới thiệu</h2>
        <iframe width="1071" height="602" src="https://www.youtube.com/embed/E9oNJrbkiIE"
            title="Introducing DJI Osmo Mobile 8P, Pro Framing and Tracking Phone Gimbal" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

    <hr>

    <!--video-->

    <section>
        <h2>Video sản phẩm</h2>
        <video controls poster="https://via.placeholder.com/800x450.png?text=Video+Poster" style="max-width: 100%; height:auto" width="800">
            <source src="Sample-video.mp4" type="video/mp4">
            <source src="Sample-video.webm" type="video/webm">
        </video>
    </section>

    <!--Audio-->
    <section>
        <h2>Nhạc nền giới thiệu</h2>
        <audio controls>
            <source src="background-music.mp3">
        </audio>
    </section>
</body>

</html>
